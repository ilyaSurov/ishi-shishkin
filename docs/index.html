<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <script>
      (function () {
        var localeKey = 'portfolio-locale';
        var themeKey = 'portfolio-theme';
        var storedLocale = localStorage.getItem(localeKey);
        var locale =
          storedLocale === 'ru' || storedLocale === 'en'
            ? storedLocale
            : navigator.language && navigator.language.toLowerCase().indexOf('ru') === 0
              ? 'ru'
              : 'en';
        document.documentElement.setAttribute('lang', locale);

        var storedTheme = localStorage.getItem(themeKey);
        var theme =
          storedTheme === 'light' || storedTheme === 'dark'
            ? storedTheme
            : window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', theme === 'light' ? '#f8fafc' : '#0f172a');
      })();
    </script>
